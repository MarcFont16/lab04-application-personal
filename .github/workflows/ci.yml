name: CI/CD Pipeline - Full Setup

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 1. detect changes in the frontend or backend directories
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: ['frontend/**']
            backend: ['backend/**']

  # 2. build and push container images to Azure Container Registry
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push Frontend
        if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.REGISTRY }}/lab4/frontend:${{ needs.detect-changes.outputs.short_sha }}
      - name: Build and Push Backend
        if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ vars.REGISTRY }}/lab4/backend:${{ needs.detect-changes.outputs.short_sha }}

  # 3. update GitOps repository with the new image tags
  update-gitops:
    needs: [detect-changes, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: gitops
      - name: Update tags with yq
        run: |
          cd gitops
          yq e '.frontend.image.tag = "${{ needs.detect-changes.outputs.short_sha }}"' -i deploy/charts/my-secure-app/values.yaml
          yq e '.backend.image.tag = "${{ needs.detect-changes.outputs.short_sha }}"' -i deploy/charts/my-secure-app/values.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deploy/charts/my-secure-app/values.yaml
          git commit -m "update image tags to ${{ needs.detect-changes.outputs.short_sha }}"
          git push